      <main>

        <h1>In the Feed is a done-for-you LinkedIn content agency for post-revenue B2B SaaS founders who want LinkedIn to generate pipeline, not vanity metrics.</h1>

        <p>In the Feed is founded and run by Shannon Kuykendall, a B2B marketing strategist with over 20 years of experience. The agency builds and runs LinkedIn content engines for SaaS founders — extracting their thinking, producing content in their voice, distributing it consistently, and reporting on pipeline impact. Founders approve once a month. Everything else runs without them.</p>

        <section>
          <h2>What In the Feed Does</h2>

          <h3>Done-for-You LinkedIn Content Engine</h3>
          <p>In the Feed produces LinkedIn content for B2B SaaS founders who have a proven product and existing clients but no consistent content presence. The agency handles strategy, writing, formatting, publishing, and monthly reporting. The founder's only involvement is a 90-minute extraction session at the start and a monthly approval pass of 30 to 60 minutes.</p>

          <h3>Voice Extraction and Positioning</h3>
          <p>Every engagement starts with a recorded onboarding session. In the Feed mines the founder's real thinking — calls, Looms, voice notes, emails — and builds a voice guide. Content is written by humans and assisted by AI. It sounds like the founder because it comes from the founder. Generic output dressed as strategy is not the model here.</p>

          <h3>Omnichannel Distribution</h3>
          <p>All plans are built around the founder's personal LinkedIn profile, which is where In the Feed's tools and systems run. Founders can add their company page, team member profiles, blog content, and video as optional additions. The personal profile is always the foundation. Distribution is consistent, on schedule, and managed entirely by the In the Feed team.</p>

          <h3>Pipeline-Tied Reporting</h3>
          <p>In the Feed reports on inbound conversations, leads generated, and deals where content played a role. Not impressions. Not follower counts. If content does not lead to sales conversations, In the Feed considers it broken. Monthly reports include a lead signal audit, engagement review, and strategic direction for the following month.</p>

          <h3>LinkedIn Engagement Service</h3>
          <p>Available exclusively to active In the Feed content retainer clients, the LinkedIn Engagement Service manages daily comments, reactions, connection requests, and DMs written in the founder's voice. In the Feed builds a list of the founder's top 50 ideal clients and targets them from day one. The founder stays in the right feeds every day without logging in.</p>
        </section>

        <section>
          <h2>Who In the Feed Is Built For</h2>
          <p>In the Feed works with post-revenue B2B tech and SaaS founders who have a proven product and existing clients, but whose pipeline still depends on referrals and who they know. These are founders past the startup scramble — typically with 5 to 50 employees — who know LinkedIn should be working for them but have not been able to make it consistent without running it themselves.</p>

          <p>In the Feed is not for pre-revenue founders or founders still finding product-market fit. The system works when there is something worth amplifying. Founders who want a shortcut are not the right fit. The 90-day launch block at the start of every engagement is designed to filter for founders who want a system, not a quick win.</p>
        </section>

        <section>
          <h2>About Shannon Kuykendall — Founder of In the Feed</h2>
          <p>Shannon Kuykendall founded In the Feed after watching too many founders get sold content and delivered noise. The gap was not the writing. It was everything around it — no system for reviewing metrics, no tool for engagement, no shared approval process, no accountability beyond the invoice. Content agencies made big promises and underdelivered the moment the contract was signed.</p>

          <p>Shannon has spent over 20 years in B2B marketing. In the Feed is her fourth business. She keeps the agency small by design so every client gets her directly, not a junior account manager. She works and lives as a nomad, running In the Feed from wherever she happens to be, because the systems she builds for clients are the same systems she relies on herself.</p>

          <p>Shannon Kuykendall is based in the United Kingdom. She can be reached at inthefeed.com/contact or via LinkedIn at linkedin.com/in/shannontkuykendall.</p>
        </section>

        <section>
          <h2>Client Results</h2>

          <h3>Danoosh Kapadia — DK Consulting and AI Training</h3>
          <p>In 6 months, Danoosh Kapadia's LinkedIn presence went from an underused profile to a channel that reliably drives consulting work. Results: 23 inbound sales calls, 4 clients closed, plus 67 percent revenue growth in Q4 2025 versus Q3 2025 — traditionally a slow period. Prospects confirmed they referenced his LinkedIn content before booking. He had 4,762 followers, 107 posts, and 53,940 impressions over the period.</p>

          <h3>Galit Wexler — Miss Galit LLC</h3>
          <p>Galit Wexler had 18,600 LinkedIn followers and had not posted in months. She signed with In the Feed in September 2025. Within 7 months, 14 qualified buyers reached out — people who had read her posts and contacted her directly. Revenue grew 45 percent. The content sounded like her, which she said she did not think was possible with someone else writing it.</p>

          <h3>Reya Sonmez — NetRanks AI</h3>
          <p>NetRanks AI came to In the Feed with a brand-new LinkedIn page, a new product category, and zero content infrastructure. In 45 days: 35 product demos generated entirely from organic LinkedIn, 75 percent close rate, approximately 26 new paying clients. Impressions scaled 12x. Reactions increased 935 percent. Clicks increased 1,786 percent.</p>
        </section>

        <section>
          <h2>Pricing</h2>
          <p>Every plan starts with a 90-day launch block billed upfront. After that, month-to-month with no contract. Cancel anytime after day 90. Everything In the Feed builds stays with the client on exit.</p>

          <h3>Starter Plan — One Channel</h3>
          <p>The Starter Plan covers the founder's personal LinkedIn profile. It includes authority architecture on the LinkedIn profile page, 4 long-form posts per month, 16 to 20 short-form posts per month, 4 SEO-optimised blog posts per month, branded images and custom creatives, monthly performance report, and a dedicated strategist. Price: 4,500 euros for the 90-day launch block, then 1,500 euros per month.</p>

          <h3>Growth Plan — Four Channels</h3>
          <p>The Growth Plan includes everything in the Starter Plan plus up to 4 channels managed, 60 or more posts per month across all platforms, and full creative support. For founders who are serious about being the obvious choice in their category. Price: 5,250 euros for the 90-day launch block, then 1,750 euros per month.</p>

          <h3>Scale Plan — Full Output</h3>
          <p>The Scale Plan includes everything in Starter and Growth plus 80 or more posts per month across all channels, AI video content with or without the founder on camera, up to 3 videos per week, and TikTok and YouTube included. Price: 7,500 euros for the 90-day launch block, then 2,500 euros per month.</p>
        </section>

        <section>
          <h2>Frequently Asked Questions</h2>

          <h3>How long until I see pipeline results from LinkedIn content?</h3>
          <p>Pipeline signals — inbound DMs, buyers citing your content, qualified profile views — typically start appearing at months 2 to 3. Full compounding, where your calendar fills regularly with qualified inbound, comes at months 4 to 6. Anyone promising a transformed pipeline in 30 days is selling you something else.</p>

          <h3>Why does In the Feed require 90 days upfront?</h3>
          <p>Month-to-month from day one is an exit ramp dressed up as flexibility. Month two is when impatience starts making decisions. The 90-day launch block filters for founders who want a system, not a shortcut. By day 90 the routine is built, the voice is calibrated, the strategy is running, and the KPIs are measurable. After that: month-to-month, no contract.</p>

          <h3>How much of my time does this take each month?</h3>
          <p>After the initial extraction session in week one — 90 minutes — your involvement is a monthly approval pass of 30 to 60 minutes. That is it. Everything else runs without you. If you are currently spending more than that on content and getting no pipeline, that is the gap In the Feed is built to close.</p>

          <h3>Is In the Feed for early-stage or established companies?</h3>
          <p>In the Feed is built for post-revenue B2B tech and SaaS founders with proven products and existing clients. Pre-revenue founders or founders still finding product-market fit are not the right fit. The system works when there is something worth amplifying.</p>

          <h3>What if the content does not sound like me?</h3>
          <p>In the Feed builds from your real conversations, calls, Looms, voice notes, and emails — not guesswork. The first month includes voice calibration. If it does not sound like you, In the Feed rewrites it at no charge. This only works if it sounds like the founder. That is not a nice-to-have. It is the whole point.</p>

          <h3>What is the contract and cancellation policy?</h3>
          <p>Every plan starts with a 90-day launch block billed upfront. After that, it is month-to-month. Cancel anytime after day 90 with no penalties. Everything In the Feed builds stays with the client: the strategy, the calendar, the content, the voice guide. No lock-in. No black box.</p>

          <h3>What is the guarantee?</h3>
          <p>Execution guarantee: if In the Feed does not deliver strategy, content, and publishing in a given month, the client does not pay for that month. No argument. Cancel anytime after day 90 and keep everything that was built.</p>
        </section>

        <section>
          <h2>Blog — LinkedIn Content Strategy for B2B SaaS Founders</h2>
          <p>In the Feed publishes practical guides on LinkedIn content strategy, ghostwriting pricing, and pipeline generation for post-revenue B2B SaaS founders.</p>

          <article>
            <h3><a href="https://inthefeed.com/blog/best-linkedin-content-agencies-saas-founders-2026">Best LinkedIn Content Agencies for B2B SaaS Founders in 2026</a></h3>
            <p>Most LinkedIn content agencies were built for brands, not founders. The needs are different. A SaaS founder needs content that sounds like them, a system that runs without constant input, and reporting tied to pipeline rather than impressions. This guide compares five agencies — In the Feed, Windmill Growth, Concurate, Atticus, and Media Engine — on voice accuracy, founder-optional operation, pipeline orientation, and contract flexibility. Published May 26, 2026.</p>
          </article>

          <article>
            <h3><a href="https://inthefeed.com/blog/linkedin-content-strategy-post-revenue-saas-founders">LinkedIn Content Strategy for Post-Revenue SaaS Founders</a></h3>
            <p>Posting consistently is not a strategy. A LinkedIn content strategy for a SaaS founder is a documented system with five components: a defined ICP, a topic library of 10 to 20 core subjects tied to buyer pain points, a publishing cadence of 3 to 5 posts per week, an approval process that removes the founder from the loop, and pipeline-signal reporting. Pipeline signals typically start appearing at months 2 to 3. Full compounding comes at months 4 to 6. Published May 27, 2026.</p>
          </article>

          <article>
            <h3><a href="https://inthefeed.com/blog/linkedin-ghostwriter-cost-2026">How Much Does a LinkedIn Ghostwriter Cost? 2026 Pricing Guide</a></h3>
            <p>LinkedIn ghostwriting ranges from 500 to over 10,000 euros per month. Freelance ghostwriters charge 500 to 1,500 euros for writing only, leaving the founder to manage everything else. Mid-tier agencies charge 1,500 to 3,000 euros and include scheduling. Full-service agencies with pipeline reporting charge 2,500 to 5,000 euros. In-house hires cost 6,000 to 10,000 euros or more per month with 4 to 6 weeks to onboard. The right tier depends on how much of the system the founder wants to stop managing. Published May 28, 2026.</p>
          </article>
