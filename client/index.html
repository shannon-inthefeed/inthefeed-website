    <!-- Structured Data - FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is The Founder Exit™?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Founder Exit™ is In the Feed's core framework for removing founders from the content production loop. The five steps are: Position (ICP, offer, pipeline targets), Extract (one 90-minute session mining calls, Looms, and voice notes), Build (written by humans, assisted by AI, sounds like the founder), Distribute (LinkedIn and omnichannel, consistently), and Exit (founder steps out, engine runs, inbound compounds). Monthly reporting tracks pipeline signals and inbound conversations, not impressions."
          }
        },
        {
          "@type": "Question",
          "name": "Is In the Feed for early-stage founders or established companies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In the Feed is built for post-revenue B2B tech and SaaS founders with proven products and existing clients. If you are pre-revenue or still finding product-market fit, this is not the right fit yet. The system works when there is something worth amplifying."
          }
        },
        {
          "@type": "Question",
          "name": "How long until I see pipeline results from LinkedIn content?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pipeline signals — inbound DMs, buyers citing your content, qualified profile views — typically start appearing at months 2 to 3. Full compounding, where your calendar fills regularly with qualified inbound, comes at months 4 to 6. Anyone promising a transformed pipeline in 30 days is selling you something else."
          }
        },
        {
          "@type": "Question",
          "name": "Why does In the Feed require 90 days upfront?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Month-to-month from day one is an exit ramp dressed up as flexibility. Month two is when impatience starts making decisions, and impatience is expensive. The 90-day launch block filters for founders who want a system, not a shortcut. By day 90 the routine is built, the voice is calibrated, the strategy is running, and the KPIs are measurable. After that it is month-to-month with no contract."
          }
        },
        {
          "@type": "Question",
          "name": "How much of my time does the content engine take each month?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After the initial extraction session in week one — 90 minutes — your involvement is a monthly approval pass of 30 to 60 minutes. That is it. Everything else runs without you. If you are currently spending more than that on content and getting no pipeline, that is the gap we are closing."
          }
        },
        {
          "@type": "Question",
          "name": "What if the content does not sound like me?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In the Feed builds from your real conversations, calls, Looms, voice notes, and emails — not guesswork. The first month includes voice calibration. If it does not sound like you, we rewrite it at no charge. This only works if it sounds like you. That is not a nice-to-have. It is the whole point."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a LinkedIn content engine for a SaaS founder cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In the Feed offers three plans. The Starter Plan covers one channel (LinkedIn personal profile) for €1,500 per month after a €4,500 90-day launch block. The Growth Plan covers four channels for €1,750 per month after a €5,250 launch block. The Scale Plan includes all channels plus AI video for €2,500 per month after a €7,500 launch block. No contract after day 90. Cancel anytime. Everything built stays yours."
          }
        },
        {
          "@type": "Question",
          "name": "What is the guarantee?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Execution guarantee: if In the Feed does not deliver strategy, content, and publishing in a given month, you do not pay for that month. Cancel anytime after the first 90 days. Keep everything that was built — the strategy, the calendar, the content, the voice guide. All yours."
          }
        },
        {
          "@type": "Question",
          "name": "What makes In the Feed different from other LinkedIn content agencies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most content agencies sell output. In the Feed sells pipeline. Every piece of content is tied to a strategy. Every strategy is tied to pipeline signals, not follower counts. Shannon Kuykendall stays small by design so every client gets her directly. The agency is operational in 48 hours, month-to-month after day 90, and has an execution guarantee."
          }
        }
      ]
    }
    </script>
